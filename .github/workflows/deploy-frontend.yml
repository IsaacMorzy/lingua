name: Deploy Astro Frontend

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'deployment/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Astro frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lingua-www
          path: |
            lingua/www
            lingua/public/frontend
          if-no-files-found: error

  deploy:
    needs: build
    # Self-hosted runner on the production server (Tailscale-protected).
    # See docs/deployment/secrets.md "Self-hosted runner setup" for registration + maintenance.
    runs-on: [self-hosted, linux, x64, lingua-deploy]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: lingua-www
          path: ${{ runner.temp }}/lingua-www

      - name: Copy frontend build into the bench
        # Local file operations: runner runs on the same machine as the bench.
        # Build job uploads with paths `lingua/www` and `lingua/public/frontend` relative to
        # its `working-directory: frontend`, so actions/upload-artifact@v4 resolves them to
        # `frontend/lingua/www` and `frontend/lingua/public/frontend` and the tarball lays
        # them out as `www/` and `public/frontend/` at the root.
        run: |
          ARTIFACT_DIR=${{ runner.temp }}/lingua-www
          WWW_SRC="$ARTIFACT_DIR/www"
          PUBLIC_SRC="$ARTIFACT_DIR/public/frontend"
          if [ ! -d "$WWW_SRC" ] || [ ! -d "$PUBLIC_SRC" ]; then
            echo "ERROR: expected $WWW_SRC and $PUBLIC_SRC to exist after artifact download"
            echo "Artifact root contents:"
            ls -la "$ARTIFACT_DIR"
            echo "All directories:"
            find "$ARTIFACT_DIR" -type d | head -20
            exit 1
          fi
          echo "Copying $WWW_SRC/ -> /home/grand/frappe-bench/apps/lingua/lingua/www/"
          rsync -a --delete "$WWW_SRC/" /home/grand/frappe-bench/apps/lingua/lingua/www/
          echo "Copying $PUBLIC_SRC/ -> /home/grand/frappe-bench/apps/lingua/lingua/public/frontend/"
          rsync -a --delete "$PUBLIC_SRC/" /home/grand/frappe-bench/apps/lingua/lingua/public/frontend/

      - name: Validate nginx config
        run: sudo nginx -t

      - name: Reload nginx
        run: sudo systemctl reload nginx

      # Note: `bench build` is intentionally NOT part of this deploy. It was in the original
      # workflow because the GitHub-hosted runner had to SSH into the server to run it, and
      # Frappe served the new static files after the build. With the self-hosted runner on
      # the same machine as the bench, the Astro output is served directly from
      # `apps/lingua/lingua/{www,public/frontend}` by Frappe's static file handler without a
      # rebuild. `bench build` is also memory-hungry (vite build for the hrms app was
      # OOM-killed in run #29215076228, exit 137) and unnecessary for a pure-frontend deploy.
      # Run it manually on the server if Frappe-side assets need refreshing.

      - name: Run Frappe migrate (manual schema changes only)
        # Uncomment and run only when Frappe schema changes; not needed for pure frontend deploys.
        if: false
        run: |
          cd /home/grand/frappe-bench && bench --site ijlaps.ac.ke migrate
