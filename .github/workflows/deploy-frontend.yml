name: Deploy Astro Frontend

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'deployment/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Astro frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lingua-www
          path: |
            lingua/www
            lingua/public/frontend
          if-no-files-found: error

  deploy:
    needs: build
    # Self-hosted runner on the production server (Tailscale-protected).
    # See docs/deployment/secrets.md "Self-hosted runner setup" for registration + maintenance.
    runs-on: [self-hosted, linux, x64, lingua-deploy]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: lingua-www
          path: ${{ runner.temp }}/lingua-www

      - name: Inspect downloaded artifact (debug)
        run: |
          echo "=== Artifact root: ${{ runner.temp }}/lingua-www ==="
          ls -la ${{ runner.temp }}/lingua-www/
          echo "=== Directory tree (first 40 entries) ==="
          find ${{ runner.temp }}/lingua-www -maxdepth 4 | head -40
          echo "=== Files inside (first 20) ==="
          find ${{ runner.temp }}/lingua-www -type f | head -20

      - name: Copy frontend build into the bench
        # Local file operations: runner runs on the same machine as the bench.
        # Locate lingua/www/ and lingua/public/frontend/ inside the extracted artifact using
        # find (rather than assuming the exact tarball layout) and rsync them into the bench.
        run: |
          ARTIFACT_DIR=${{ runner.temp }}/lingua-www
          WWW_SRC=$(find "$ARTIFACT_DIR" -type d -path '*/lingua/www' | head -1)
          PUBLIC_SRC=$(find "$ARTIFACT_DIR" -type d -path '*/lingua/public/frontend' | head -1)
          if [ -z "$WWW_SRC" ] || [ -z "$PUBLIC_SRC" ]; then
            echo "ERROR: could not locate lingua/www or lingua/public/frontend in artifact"
            echo "Looking for: $ARTIFACT_DIR/lingua/www and $ARTIFACT_DIR/lingua/public/frontend"
            echo "Found lingua/www: '$WWW_SRC'"
            echo "Found lingua/public/frontend: '$PUBLIC_SRC'"
            exit 1
          fi
          echo "Copying $WWW_SRC/ -> /home/grand/frappe-bench/apps/lingua/lingua/www/"
          rsync -a --delete "$WWW_SRC/" /home/grand/frappe-bench/apps/lingua/lingua/www/
          echo "Copying $PUBLIC_SRC/ -> /home/grand/frappe-bench/apps/lingua/lingua/public/frontend/"
          rsync -a --delete "$PUBLIC_SRC/" /home/grand/frappe-bench/apps/lingua/lingua/public/frontend/

      - name: Run bench build to refresh Frappe assets
        run: |
          cd /home/grand/frappe-bench && bench build

      - name: Validate nginx config
        run: sudo nginx -t

      - name: Reload nginx
        run: sudo systemctl reload nginx

      - name: Run Frappe migrate (manual schema changes only)
        # Uncomment and run only when Frappe schema changes; not needed for pure frontend deploys.
        # Requires the bench migrate sudo permission on the runner user.
        if: false
        run: |
          cd /home/grand/frappe-bench && bench --site ijlaps.ac.ke migrate
