name: Deploy Astro Frontend

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'deployment/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Astro frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lingua-www
          path: |
            lingua/www
            lingua/public/frontend
          if-no-files-found: error

  deploy:
    needs: build
    # Self-hosted runner on the production server (Tailscale-protected).
    # See docs/deployment/secrets.md "Self-hosted runner setup" for registration + maintenance.
    runs-on: [self-hosted, linux, x64, lingua-deploy]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: lingua-www
          path: ${{ runner.temp }}/lingua-www

      - name: Copy frontend build into the bench
        # Local file operations: runner runs on the same machine as the bench.
        # The artifact tarball has lingua/www/... and lingua/public/frontend/... at the top.
        # Download to runner.temp first so the source paths are explicit and not dependent
        # on the runner's _work working directory.
        run: |
          ls -la ${{ runner.temp }}/lingua-www/
          rsync -a --delete ${{ runner.temp }}/lingua-www/lingua/www/ /home/grand/frappe-bench/apps/lingua/lingua/www/
          rsync -a --delete ${{ runner.temp }}/lingua-www/lingua/public/frontend/ /home/grand/frappe-bench/apps/lingua/lingua/public/frontend/

      - name: Run bench build to refresh Frappe assets
        run: |
          cd /home/grand/frappe-bench && bench build

      - name: Validate nginx config
        run: sudo nginx -t

      - name: Reload nginx
        run: sudo systemctl reload nginx

      - name: Run Frappe migrate (manual schema changes only)
        # Uncomment and run only when Frappe schema changes; not needed for pure frontend deploys.
        # Requires the bench migrate sudo permission on the runner user.
        if: false
        run: |
          cd /home/grand/frappe-bench && bench --site ijlaps.ac.ke migrate
