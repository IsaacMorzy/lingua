# Nginx site configuration for ijlaps.ac.ke
# Astro frontend (lingua/frontend) is built into lingua/www/ and served by
# Frappe; Nginx reverse-proxies to Frappe and serves static assets directly.
#
# Install:
#   sudo ln -s /home/grand/frappe-bench/apps/lingua/deployment/nginx/ijlaps.ac.ke.conf /etc/nginx/sites-enabled/ijlaps.ac.ke
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo certbot --nginx -d ijlaps.ac.ke -d www.ijlaps.ac.ke

# ---------------------------------------------------------------------------
# Upstream: Frappe gunicorn worker
# ---------------------------------------------------------------------------
upstream frappe_gunicorn {
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
}

# ---------------------------------------------------------------------------
# Rate limiting zone (optional, 10 r/s per IP)
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=frappe_limit:10m rate=10r/s;

# ---------------------------------------------------------------------------
# HTTP: redirect to HTTPS and serve ACME challenges
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ijlaps.ac.ke www.ijlaps.ac.ke;

    # Let Certbot handle the redirect after certificate issuance, but keep
    # a fallback location for the ACME challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS: main site
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name ijlaps.ac.ke www.ijlaps.ac.ke;

    # -----------------------------------------------------------------------
    # SSL certificates (managed by Certbot)
    # -----------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/ijlaps.ac.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ijlaps.ac.ke/privkey.pem;

    # Modern TLS configuration
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers   on;
    ssl_ciphers                 ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout         1d;
    ssl_session_cache           shared:SSL_IJLAPS:50m;
    ssl_session_tickets         off;

    # OCSP Stapling (enable after Certbot has issued the certificate)
    ssl_stapling        on;
    ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/letsencrypt/live/ijlaps.ac.ke/chain.pem;

    # -----------------------------------------------------------------------
    # Logs
    # -----------------------------------------------------------------------
    access_log /var/log/nginx/ijlaps.ac.ke.access.log;
    error_log  /var/log/nginx/ijlaps.ac.ke.error.log;

    # -----------------------------------------------------------------------
    # Upload limits (Frappe attachments, imports)
    # -----------------------------------------------------------------------
    client_max_body_size 50M;

    # -----------------------------------------------------------------------
    # Static root for the Astro frontend (built into lingua/www)
    # -----------------------------------------------------------------------
    root /home/grand/frappe-bench/apps/lingua/lingua/www;
    index index.html;

    # -----------------------------------------------------------------------
    # Security headers
    # -----------------------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # -----------------------------------------------------------------------
    # Gzip compression
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # -----------------------------------------------------------------------
    # Frappe /assets (collected app assets, including Astro build)
    # URL: /assets/lingua/frontend/... -> /home/grand/frappe-bench/sites/assets/lingua/frontend/...
    # -----------------------------------------------------------------------
    location /assets/ {
        alias /home/grand/frappe-bench/sites/assets/;
        expires 6M;
        access_log off;
        try_files $uri $uri/ =404;
    }

    # -----------------------------------------------------------------------
    # Frappe uploaded files
    # URL: /files/... -> /home/grand/frappe-bench/sites/ijlaps.ac.ke/public/files/...
    # -----------------------------------------------------------------------
    location /files/ {
        alias /home/grand/frappe-bench/sites/ijlaps.ac.ke/public/files/;
        expires 6M;
        access_log off;
        try_files $uri $uri/ =404;
    }

    # -----------------------------------------------------------------------
    # WebSocket / socket.io support (Frappe real-time)
    # -----------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://frappe_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # -----------------------------------------------------------------------
    # Frappe-specific routes (API, Desk, auth) - proxy to gunicorn
    # -----------------------------------------------------------------------
    location ~ ^/(api|app|desk|login|logout|signup|web|page|frappe)(/|$) {
        proxy_pass         http://frappe_gunicorn;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;

        proxy_redirect     off;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        limit_req zone=frappe_limit burst=20 nodelay;
    }

    # -----------------------------------------------------------------------
    # Nginx health check (does not depend on Frappe)
    # -----------------------------------------------------------------------
    location /health/nginx {
        access_log off;
        default_type text/plain;
        return 200 "nginx ok\n";
    }

    # -----------------------------------------------------------------------
    # Frappe health check endpoint (proxies to Frappe ping)
    # -----------------------------------------------------------------------
    location /health/frappe {
        access_log off;
        proxy_pass         http://frappe_gunicorn/api/method/frappe.ping;
        proxy_http_version 1.1;
        proxy_redirect     off;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    5s;
        proxy_read_timeout    5s;
    }

    # -----------------------------------------------------------------------
    # Status page with links to health endpoints
    # -----------------------------------------------------------------------
    location /status {
        access_log off;
        default_type application/json;
        return 200 '{"service":"ijlaps.ac.ke","status":"ok","endpoints":{"nginx":"/health/nginx","frappe":"/health/frappe"}}';
    }

    # -----------------------------------------------------------------------
    # Static Astro pages served directly from lingua/www
    # Falls back to Frappe for dynamic routes not present in the build.
    # -----------------------------------------------------------------------
    location / {
        try_files $uri $uri/ $uri/index.html $uri.html @frappe;
        expires 1h;
        add_header Cache-Control "public, must-revalidate" always;
    }

    # -----------------------------------------------------------------------
    # Fallback to Frappe gunicorn for dynamic routes
    # -----------------------------------------------------------------------
    location @frappe {
        proxy_pass         http://frappe_gunicorn;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;

        proxy_redirect     off;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Optional rate limiting
        limit_req zone=frappe_limit burst=20 nodelay;
    }

    # -----------------------------------------------------------------------
    # Deny access to hidden files and sensitive paths
    # -----------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(py|pyc|sql|ini|log|git|env)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
