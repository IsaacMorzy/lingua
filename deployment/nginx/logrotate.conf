/var/log/nginx/ijlaps.ac.ke.*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        # Signal Nginx to reopen log files
        if [ -f /run/nginx.pid ]; then
            kill -USR1 "$(cat /run/nginx.pid)" >/dev/null 2>&1
        fi
    endscript
}
